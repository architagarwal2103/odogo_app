name: odogo_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_database: ^10.5.7
  cloud_firestore: ^4.13.6
  http: ^1.2.2
  geolocator: ^13.0.2
  provider: ^6.1.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  firebase_storage: ^11.6.5
  permission_handler: ^12.0.1
  file_picker: ^10.3.10
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  mocktail: ^1.0.4

dependency_overrides:
  latlong2: 0.9.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/odogo_app_logo.png
    - assets/images/odogo_logo.png
    - assets/images/odogo_logo_black_bg.jpeg
    - assets/images/odogo_logo_without_bg.png

# --- APP ICON GENERATOR ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/odogo_app_logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/odogo_app_logo.png"
  min_sdk_android: 21

# --- SPLASH SCREEN GENERATOR ---
flutter_native_splash:
  color: "#000000"
  image: "assets/images/odogo_logo.png"
  android: true
  ios: false
  android_12:
    image: "assets/images/odogo_logo.png"
    color: "#000000"